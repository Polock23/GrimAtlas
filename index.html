<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Idea Vault" />
<link rel="manifest" href="manifest.json" />
<title>Idea Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#0a0805; --bg2:#13100a; --bg3:#1c1710;
  --border:rgba(255,220,120,0.1); --border2:rgba(255,220,120,0.18);
  --gold:#f0c060; --gold2:#c89030;
  --text:#f0ead8; --text2:#9a9080; --text3:#6a6058;
  --green:#60d090; --red:#e06060; --blue:#60a0e0; --purple:#a060e0;
  --fd:'Cormorant Garamond',serif; --fu:'Syne',sans-serif; --fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fu)}
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(240,192,96,0.06) 0%,transparent 60%),var(--bg)}
.abox{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:40px 36px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.alogo{font-family:var(--fd);font-size:36px;font-weight:700;color:var(--gold);margin-bottom:4px}
.asub{font-size:12px;color:var(--text3);font-family:var(--fm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px}
.atabs{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.atab{flex:1;padding:9px;text-align:center;font-size:13px;font-family:var(--fm);cursor:pointer;background:transparent;border:none;color:var(--text3);transition:all 0.2s}
.atab.on{background:rgba(240,192,96,0.12);color:var(--gold)}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:10px;font-family:var(--fm);color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.fld input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--fu);outline:none}
.fld input:focus{border-color:var(--gold2)}
.bprimary{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:12px;font-weight:700;font-size:14px;font-family:var(--fu);cursor:pointer}
.bprimary:disabled{opacity:0.5;cursor:not-allowed}
.amsg{margin-top:10px;font-size:12px;text-align:center;min-height:18px;font-family:var(--fm)}
.amsg.err{color:var(--red)} .amsg.ok{color:var(--green)}
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.tlogo{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--gold);flex:1}
.ibtn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;padding:6px 14px;font-family:var(--fm);font-size:12px;transition:all 0.15s}
.ibtn:hover{border-color:var(--border2);color:var(--text)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.ssec{padding:16px 14px 8px}
.slabel{font-size:10px;font-family:var(--fm);color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding:0 6px}
.fi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;font-size:13.5px;color:var(--text2)}
.fi:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.fi.on{background:rgba(240,192,96,0.1);color:var(--gold)}
.fi .cnt{margin-left:auto;font-family:var(--fm);font-size:11px;color:var(--text3)}
.addfbtn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text3);font-family:var(--fm);background:none;border:none;width:100%;transition:color 0.15s}
.addfbtn:hover{color:var(--gold)}
.content{flex:1;overflow-y:auto;padding:24px}
.cheader{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ctitle{font-family:var(--fd);font-size:26px;font-weight:700;flex:1}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fp{font-size:11px;font-family:var(--fm);padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--text3);cursor:pointer;background:transparent;transition:all 0.15s}
.fp.on{border-color:var(--gold);color:var(--gold);background:rgba(240,192,96,0.1)}
.swrap{margin-bottom:16px}
.swrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 16px;color:var(--text);font-size:13.5px;font-family:var(--fu);outline:none}
.swrap input::placeholder{color:var(--text3)}
.ic{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color 0.2s}
.ic::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.ic[data-type="Video Game"]::before{background:var(--green)}
.ic[data-type="Board Game"]::before{background:var(--gold)}
.ic[data-type="Story"]::before{background:var(--purple)}
.ic:hover{border-color:var(--border2)}
.ititle{font-family:var(--fd);font-size:18px;font-weight:600}
.idesc{font-size:13.5px;color:var(--text2);line-height:1.65;margin:8px 0}
.itags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.itag{font-size:11px;font-family:var(--fm);padding:2px 9px;border-radius:20px}
.iacts{display:flex;gap:6px;flex-wrap:wrap}
.ibtn2{font-size:11px;font-family:var(--fm);padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid;background:transparent;transition:background 0.15s}
.ibtn2.ai{color:var(--gold);border-color:rgba(240,192,96,0.3)}
.ibtn2.ai:hover{background:rgba(240,192,96,0.1)}
.ibtn2.ch{color:var(--blue);border-color:rgba(96,160,224,0.3)}
.ibtn2.ch:hover{background:rgba(96,160,224,0.1)}
.ibtn2.ed{color:var(--text2);border-color:var(--border)}
.ibtn2.ed:hover{background:rgba(255,255,255,0.05)}
.ibtn2.dl{color:var(--red);border-color:rgba(224,96,96,0.3)}
.ibtn2.dl:hover{background:rgba(224,96,96,0.1)}
.ibtn2:disabled{opacity:0.4;cursor:not-allowed}
.iexp{margin-top:14px;padding:14px 16px;background:rgba(240,192,96,0.04);border:1px solid rgba(240,192,96,0.12);border-radius:8px}
.iexpl{font-size:10px;font-family:var(--fm);color:var(--gold);letter-spacing:1.5px;margin-bottom:8px}
.iexpt{font-size:13px;color:var(--text2);line-height:1.75;white-space:pre-wrap}
.badge{display:inline-block;font-size:10px;font-family:var(--fm);padding:2px 8px;border-radius:20px}
.badge.vg{color:var(--green);background:rgba(96,208,144,0.1);border:1px solid rgba(96,208,144,0.2)}
.badge.bg{color:var(--gold);background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.2)}
.badge.st{color:var(--purple);background:rgba(160,96,224,0.1);border:1px solid rgba(160,96,224,0.2)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.eicon{font-size:40px;margin-bottom:12px}
.etxt{font-family:var(--fd);font-size:20px;color:var(--text2);margin-bottom:6px}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:520px;box-shadow:0 24px 80px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto}
.mtitle{font-family:var(--fd);font-size:22px;font-weight:700;margin-bottom:20px}
.mfld{margin-bottom:16px}
.mfld label{display:block;font-size:10px;font-family:var(--fm);color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.mfld input,.mfld textarea,.mfld select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13.5px;font-family:var(--fu);outline:none;resize:vertical}
.mfld input:focus,.mfld textarea:focus,.mfld select:focus{border-color:var(--gold2)}
.mfld select option{background:var(--bg2)}
.tbtns{display:flex;gap:8px;flex-wrap:wrap}
.tbtn{padding:7px 14px;border-radius:8px;font-size:12px;font-family:var(--fm);cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all 0.15s}
.tbtn.svg{border-color:var(--green);color:var(--green);background:rgba(96,208,144,0.1)}
.tbtn.sbg{border-color:var(--gold);color:var(--gold);background:rgba(240,192,96,0.1)}
.tbtn.sst{border-color:var(--purple);color:var(--purple);background:rgba(160,96,224,0.1)}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.bghost{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:9px 18px;font-family:var(--fu);font-size:13px;cursor:pointer}
.bsave{background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:9px 20px;font-weight:700;font-size:13px;font-family:var(--fu);cursor:pointer}
.cpanel{position:fixed;inset:0;z-index:150;display:flex;align-items:flex-end;justify-content:center;padding:16px;background:rgba(0,0,0,0.72)}
.cbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:580px;max-height:82vh;display:flex;flex-direction:column}
.chdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chtitle{font-family:var(--fd);font-size:17px;font-weight:600;flex:1}
.cclose{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.cmsgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.cmsg{max-width:88%;border-radius:10px;padding:10px 14px;font-size:13.5px;line-height:1.65}
.cmsg.user{align-self:flex-end;background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.2);color:var(--gold)}
.cmsg.assistant{align-self:flex-start;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text2);white-space:pre-wrap}
.cmsg.thinking{color:var(--text3);font-family:var(--fm);font-size:12px;border:1px dashed var(--border);align-self:flex-start}
.cinrow{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.cinput{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13.5px;font-family:var(--fu);outline:none}
.csend{background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:16px;cursor:pointer}
.csend:disabled{opacity:0.4;cursor:not-allowed}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 20px;font-size:13px;font-family:var(--fm);color:var(--text2);z-index:999;transition:transform 0.3s;pointer-events:none;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.ok{color:var(--green)} .toast.err{color:var(--red)}
@media(max-width:640px){.sidebar{display:none}.content{padding:16px}}
</style>
</head>
<body>

<div id="auth">
  <div class="abox">
    <div class="alogo">Idea Vault</div>
    <div class="asub">Creative Ideas Manager</div>
    <div class="atabs">
      <button class="atab on" id="tab-in" onclick="switchTab('in')">Sign In</button>
      <button class="atab" id="tab-up" onclick="switchTab('up')">Sign Up</button>
    </div>
    <div class="fld"><label>Email</label><input type="email" id="a-email" placeholder="you@example.com" /></div>
    <div class="fld"><label>Password</label><input type="password" id="a-pass" placeholder="••••••••" /></div>
    <button class="bprimary" id="a-btn" onclick="doAuth()">Sign In</button>
    <div class="amsg" id="a-msg"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tlogo">Idea Vault ✦</div>
    <button class="ibtn" onclick="doSignOut()">Sign Out</button>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="ssec">
        <div class="slabel">Folders</div>
        <div id="flist"></div>
        <button class="addfbtn" onclick="openFolderModal(null)">+ New Folder</button>
      </div>
    </div>
    <div class="content">
      <div class="cheader">
        <div class="ctitle" id="ctitle">All Ideas</div>
        <button class="ibtn" onclick="openIdeaModal(null)">+ Add Idea</button>
      </div>
      <div class="swrap"><input type="text" id="search" placeholder="Search ideas…" oninput="renderIdeas()" /></div>
      <div class="filters">
        <button class="fp on" data-t="All" onclick="setFilter('All')">All Types</button>
        <button class="fp" data-t="Video Game" onclick="setFilter('Video Game')">🎮 Video Game</button>
        <button class="fp" data-t="Board Game" onclick="setFilter('Board Game')">♟️ Board Game</button>
        <button class="fp" data-t="Story" onclick="setFilter('Story')">📖 Story</button>
      </div>
      <div id="grid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="mroot"></div>
<div id="croot"></div>

<script>
var SUPA_URL = 'https://uedwjzojbrkcedckwxbr.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZHdqem9qYnJrY2VkY2t3eGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MjMxMjUsImV4cCI6MjA5NDI5OTEyNX0.2YRvP83u2MBtjdbFKfnqOQNbnoE_O0tz0XA8my_iQPU';
var CLAUDE = 'claude-sonnet-4-20250514';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

var USER = null;
var FOLDERS = [];
var IDEAS = [];
var ACTIVE_FOLDER = null;
var TYPE_FILTER = 'All';
var EXPANDING = null;
var SEL_TYPE = 'Video Game';
var SEL_ICON = '📁';
var EDIT_IDEA = null;
var EDIT_FOLDER = null;
var CHAT_IDEA = null;
var CHAT_MSGS = [];
var CHAT_LOADING = false;
var authMode = 'in';

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-in').className = 'atab' + (mode === 'in' ? ' on' : '');
  document.getElementById('tab-up').className = 'atab' + (mode === 'up' ? ' on' : '');
  document.getElementById('a-btn').textContent = mode === 'in' ? 'Sign In' : 'Create Account';
  document.getElementById('a-msg').textContent = '';
}

function doAuth() {
  var email = document.getElementById('a-email').value.trim();
  var pass = document.getElementById('a-pass').value;
  var btn = document.getElementById('a-btn');
  if (!email || !pass) { setMsg('Please fill in both fields.', 'err'); return; }
  btn.disabled = true;
  var p = authMode === 'in'
    ? sb.auth.signInWithPassword({ email: email, password: pass })
    : sb.auth.signUp({ email: email, password: pass });
  p.then(function(r) {
    if (r.error) { setMsg(r.error.message, 'err'); }
    else if (authMode === 'up' && !r.data.session) { setMsg('Check your email to confirm.', 'ok'); }
    btn.disabled = false;
  }).catch(function(e) {
    setMsg(e.message || 'Something went wrong.', 'err');
    btn.disabled = false;
  });
}

function setMsg(text, type) {
  var el = document.getElementById('a-msg');
  el.textContent = text;
  el.className = 'amsg ' + (type || '');
}

function doSignOut() {
  sb.auth.signOut().then(function() {
    USER = null; FOLDERS = []; IDEAS = [];
    document.getElementById('app').className = '';
    document.getElementById('auth').style.display = 'flex';
  });
}

sb.auth.onAuthStateChange(function(event, session) {
  if (session && session.user) {
    USER = session.user;
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').className = 'on';
    loadAll();
  }
});

function loadAll() {
  Promise.all([loadFolders(), loadIdeas()]).then(function() {
    renderSidebar();
    renderIdeas();
  });
}

function loadFolders() {
  return sb.from('folders').select('*').eq('user_id', USER.id).order('created_at').then(function(r) {
    if (r.error) { console.error('folders:', r.error); }
    else { FOLDERS = r.data || []; }
  });
}

function loadIdeas() {
  return sb.from('ideas').select('*').eq('user_id', USER.id).order('created_at', { ascending: false }).then(function(r) {
    if (r.error) { console.error('ideas:', r.error); }
    else { IDEAS = r.data || []; }
  });
}

function renderSidebar() {
  var html = '<div class="fi ' + (ACTIVE_FOLDER === null ? 'on' : '') + '" onclick="setFolder(null)"><span>📂</span><span style="flex:1">All Ideas</span><span class="cnt">' + IDEAS.length + '</span></div>';
  FOLDERS.forEach(function(f) {
    var count = IDEAS.filter(function(i) { return i.folder_id === f.id; }).length;
    html += '<div class="fi ' + (ACTIVE_FOLDER === f.id ? 'on' : '') + '" onclick="setFolder(\'' + f.id + '\')"><span>' + (f.icon || '📁') + '</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(f.name) + '</span><span class="cnt">' + count + '</span></div>';
  });
  document.getElementById('flist').innerHTML = html;
  var active = FOLDERS.find(function(f) { return f.id === ACTIVE_FOLDER; });
  document.getElementById('ctitle').textContent = ACTIVE_FOLDER === null ? 'All Ideas' : (active ? active.name : 'Folder');
}

function setFolder(id) {
  ACTIVE_FOLDER = id;
  renderSidebar();
  renderIdeas();
}

function setFilter(type) {
  TYPE_FILTER = type;
  document.querySelectorAll('.fp').forEach(function(p) {
    p.className = 'fp' + (p.dataset.t === type ? ' on' : '');
  });
  renderIdeas();
}

function renderIdeas() {
  var search = (document.getElementById('search').value || '').toLowerCase();
  var list = IDEAS.slice();
  if (ACTIVE_FOLDER !== null) list = list.filter(function(i) { return i.folder_id === ACTIVE_FOLDER; });
  if (TYPE_FILTER !== 'All') list = list.filter(function(i) { return i.type === TYPE_FILTER; });
  if (search) list = list.filter(function(i) { return i.title.toLowerCase().indexOf(search) >= 0 || (i.description || '').toLowerCase().indexOf(search) >= 0; });

  var grid = document.getElementById('grid');
  if (!grid) return;

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="eicon">✦</div><div class="etxt">No ideas here yet</div></div>';
    return;
  }

  var typeMap = { 'Video Game': ['🎮', 'vg'], 'Board Game': ['♟️', 'bg'], 'Story': ['📖', 'st'] };

  grid.innerHTML = list.map(function(idea) {
    var tm = typeMap[idea.type] || ['💡', 'vg'];
    var icon = tm[0];
    var cls = tm[1];
    var tags = (idea.tags || []).map(function(t) {
      return '<span class="itag" style="background:' + tagBg(t) + ';color:' + tagColor(t) + ';border:1px solid ' + tagColor(t) + '44">#' + esc(t) + '</span>';
    }).join('');
    var folder = FOLDERS.find(function(f) { return f.id === idea.folder_id; });
    var expanded = idea.expanded_content
      ? '<div class="iexp"><div class="iexpl">✦ AI Expansion</div><div class="iexpt">' + esc(idea.expanded_content) + '</div></div>'
      : '';
    var aiLabel = EXPANDING === idea.id ? 'Thinking…' : (idea.expanded_content ? 'Re-expand ✦' : 'Expand with AI ✦');
    var html = '<div class="ic" data-type="' + esc(idea.type) + '">';
    html += '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px">';
    html += '<span style="font-size:20px">' + icon + '</span>';
    html += '<span class="ititle">' + esc(idea.title) + '</span>';
    html += '<span class="badge ' + cls + '">' + idea.type + '</span>';
    if (folder) html += '<span style="font-size:10px;font-family:var(--fm);color:var(--text3)">📁 ' + esc(folder.name) + '</span>';
    html += '</div>';
    html += '<div class="idesc">' + esc(idea.description || '') + '</div>';
    if (tags) html += '<div class="itags">' + tags + '</div>';
    html += '<div class="iacts">';
    html += '<button class="ibtn2 ai" onclick="expandIdea(\'' + idea.id + '\')" ' + (EXPANDING === idea.id ? 'disabled' : '') + '>' + aiLabel + '</button>';
    html += '<button class="ibtn2 ch" onclick="openChat(\'' + idea.id + '\')">💬 Chat</button>';
    html += '<button class="ibtn2 ed" onclick="openIdeaModal(\'' + idea.id + '\')">Edit</button>';
    html += '<button class="ibtn2 dl" onclick="deleteIdea(\'' + idea.id + '\')">Delete</button>';
    html += '</div>';
    html += expanded;
    html += '</div>';
    return html;
  }).join('');
}

var ICONS = ['📁','🎮','♟️','📖','🌌','⚔️','🧠','🌊','🏔️','🔮','🌿','💡','🎲','🎭','🚀'];

function openFolderModal(id) {
  EDIT_FOLDER = id ? FOLDERS.find(function(f) { return f.id === id; }) : null;
  SEL_ICON = EDIT_FOLDER ? (EDIT_FOLDER.icon || '📁') : '📁';
  var iconBtns = ICONS.map(function(ic) {
    return '<button onclick="pickIcon(\'' + ic + '\')" id="ic-' + ic + '" style="font-size:20px;background:none;border:2px solid ' + (ic === SEL_ICON ? 'var(--gold)' : 'var(--border)') + ';border-radius:8px;padding:5px 8px;cursor:pointer">' + ic + '</button>';
  }).join('');
  var del = EDIT_FOLDER ? '<button class="bghost" style="color:var(--red)" onclick="deleteFolder(\'' + EDIT_FOLDER.id + '\')">Delete</button>' : '';
  document.getElementById('mroot').innerHTML = '<div class="moverlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="mtitle">' + (EDIT_FOLDER ? 'Edit Folder' : 'New Folder') + '</div><div class="mfld"><label>Name</label><input type="text" id="f-name" value="' + (EDIT_FOLDER ? esc(EDIT_FOLDER.name) : '') + '" placeholder="e.g. Sci-Fi Games" /></div><div class="mfld"><label>Icon</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">' + iconBtns + '</div></div><div class="mfoot"><button class="bghost" onclick="closeModal()">Cancel</button>' + del + '<button class="bsave" onclick="saveFolder()">Save</button></div></div></div>';
}

function pickIcon(ic) {
  SEL_ICON = ic;
  ICONS.forEach(function(i) {
    var el = document.getElementById('ic-' + i);
    if (el) el.style.borderColor = i === ic ? 'var(--gold)' : 'var(--border)';
  });
}

function saveFolder() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Please enter a folder name.'); return; }
  if (!USER) { alert('Not signed in.'); return; }
  var p = EDIT_FOLDER
    ? sb.from('folders').update({ name: name, icon: SEL_ICON }).eq('id', EDIT_FOLDER.id)
    : sb.from('folders').insert({ name: name, icon: SEL_ICON, user_id: USER.id });
  p.then(function(r) {
    if (r.error) { alert('Error: ' + r.error.message); return; }
    closeModal();
    loadAll();
    toast('Folder saved ✦', 'ok');
  });
}

function deleteFolder(id) {
  if (!confirm('Delete this folder? Ideas will move to All Ideas.')) return;
  sb.from('ideas').update({ folder_id: null }).eq('folder_id', id).then(function() {
    sb.from('folders').delete().eq('id', id).then(function() {
      closeModal();
      ACTIVE_FOLDER = null;
      loadAll();
      toast('Folder deleted');
    });
  });
}

function openIdeaModal(id) {
  EDIT_IDEA = id ? IDEAS.find(function(i) { return i.id === id; }) : null;
  SEL_TYPE = EDIT_IDEA ? EDIT_IDEA.type : 'Video Game';
  var types = ['Video Game', 'Board Game', 'Story'];
  var ticons = { 'Video Game': '🎮', 'Board Game': '♟️', 'Story': '📖' };
  var tbtns = types.map(function(t) {
    return '<button class="tbtn" id="tb-' + t.replace(/ /g, '-') + '" onclick="pickType(\'' + t + '\')">' + ticons[t] + ' ' + t + '</button>';
  }).join('');
  var folderOpts = FOLDERS.map(function(f) {
    return '<option value="' + f.id + '"' + (EDIT_IDEA && EDIT_IDEA.folder_id === f.id ? ' selected' : '') + '>' + esc(f.name) + '</option>';
  }).join('');
  document.getElementById('mroot').innerHTML = '<div class="moverlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="mtitle">' + (EDIT_IDEA ? 'Edit Idea' : 'New Idea') + '</div><div class="mfld"><label>Title</label><input type="text" id="i-title" value="' + (EDIT_IDEA ? esc(EDIT_IDEA.title) : '') + '" placeholder="Give your idea a name…" /></div><div class="mfld"><label>Type</label><div class="tbtns">' + tbtns + '</div></div><div class="mfld"><label>Description</label><textarea id="i-desc" rows="4" placeholder="What is the core concept?">' + (EDIT_IDEA ? esc(EDIT_IDEA.description || '') : '') + '</textarea></div><div class="mfld"><label>Tags (comma separated)</label><input type="text" id="i-tags" value="' + (EDIT_IDEA ? (EDIT_IDEA.tags || []).join(', ') : '') + '" placeholder="e.g. sci-fi, roguelike, co-op" /></div><div class="mfld"><label>Folder</label><select id="i-folder"><option value="">No folder</option>' + folderOpts + '</select></div><div class="mfoot"><button class="bghost" onclick="closeModal()">Cancel</button><button class="bsave" onclick="saveIdea()">Save Idea</button></div></div></div>';
  pickType(SEL_TYPE);
}

function pickType(t) {
  SEL_TYPE = t;
  var clsMap = { 'Video Game': 'svg', 'Board Game': 'sbg', 'Story': 'sst' };
  ['Video Game', 'Board Game', 'Story'].forEach(function(x) {
    var el = document.getElementById('tb-' + x.replace(/ /g, '-'));
    if (el) el.className = 'tbtn' + (x === t ? ' ' + clsMap[x] : '');
  });
}

function saveIdea() {
  var title = document.getElementById('i-title').value.trim();
  var desc = document.getElementById('i-desc').value.trim();
  var tagsRaw = document.getElementById('i-tags').value;
  var folder_id = document.getElementById('i-folder').value || null;
  var tags = tagsRaw.split(',').map(function(t) { return t.trim().toLowerCase(); }).filter(Boolean);
  if (!title) { alert('Please enter a title.'); return; }
  if (!USER) { alert('Not signed in.'); return; }
  var payload = { title: title, type: SEL_TYPE, description: desc, tags: tags, folder_id: folder_id, user_id: USER.id };
  var p = EDIT_IDEA
    ? sb.from('ideas').update(payload).eq('id', EDIT_IDEA.id)
    : sb.from('ideas').insert(payload);
  p.then(function(r) {
    if (r.error) { alert('Error: ' + r.error.message); return; }
    closeModal();
    loadAll();
    toast('Idea saved ✦', 'ok');
  });
}

function deleteIdea(id) {
  if (!confirm('Delete this idea?')) return;
  sb.from('ideas').delete().eq('id', id).then(function() {
    loadAll();
    toast('Idea deleted');
  });
}

function expandIdea(id) {
  var idea = IDEAS.find(function(i) { return i.id === id; });
  if (!idea) return;
  EXPANDING = id;
  renderIdeas();
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CLAUDE,
      max_tokens: 1000,
      system: 'You are a creative collaborator. Given a game or story idea, provide: Core mechanics or plot hooks (3-4 bullets), Unique selling point, One key challenge, Elevator pitch (one sentence). Under 250 words. Plain text only.',
      messages: [{ role: 'user', content: 'Title: ' + idea.title + '\nType: ' + idea.type + '\nDescription: ' + idea.description + '\nTags: ' + (idea.tags || []).join(', ') }]
    })
  }).then(function(r) { return r.json(); }).then(function(data) {
    var text = data.content && data.content.find(function(b) { return b.type === 'text'; });
    var result = text ? text.text : 'Could not expand.';
    return sb.from('ideas').update({ expanded_content: result }).eq('id', id);
  }).then(function() {
    return loadIdeas();
  }).then(function() {
    EXPANDING = null;
    renderIdeas();
  }).catch(function(e) {
    toast('Expansion failed: ' + e.message, 'err');
    EXPANDING = null;
    renderIdeas();
  });
}

function openChat(id) {
  CHAT_IDEA = IDEAS.find(function(i) { return i.id === id; });
  CHAT_MSGS = [];
  renderChat();
}

function renderChat() {
  if (!CHAT_IDEA) { document.getElementById('croot').innerHTML = ''; return; }
  var msgs = CHAT_MSGS.map(function(m) {
    return '<div class="cmsg ' + m.role + '">' + esc(m.content) + '</div>';
  }).join('');
  var empty = msgs ? '' : '<div style="color:var(--text3);font-size:12px;font-family:var(--fm);text-align:center;margin-top:20px">Ask anything about this idea…</div>';
  var thinking = CHAT_LOADING ? '<div class="cmsg thinking">Thinking…</div>' : '';
  document.getElementById('croot').innerHTML = '<div class="cpanel" onclick="if(event.target===this)closeChat()"><div class="cbox" onclick="event.stopPropagation()"><div class="chdr"><div class="chtitle">💬 ' + esc(CHAT_IDEA.title) + '</div><button class="cclose" onclick="closeChat()">✕</button></div><div class="cmsgs" id="cmsgs">' + empty + msgs + thinking + '</div><div class="cinrow"><input class="cinput" id="cinput" placeholder="Ask something…" /><button class="csend" onclick="sendChat()" ' + (CHAT_LOADING ? 'disabled' : '') + '>→</button></div></div></div>';
  var el = document.getElementById('cmsgs');
  if (el) el.scrollTop = el.scrollHeight;
  var inp = document.getElementById('cinput');
  if (inp) {
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendChat(); });
    setTimeout(function() { inp.focus(); }, 50);
  }
}

function sendChat() {
  var input = document.getElementById('cinput');
  var text = input ? input.value.trim() : '';
  if (!text || CHAT_LOADING) return;
  CHAT_MSGS.push({ role: 'user', content: text });
  CHAT_LOADING = true;
  renderChat();
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CLAUDE,
      max_tokens: 1000,
      system: 'You are a creative collaborator helping develop a ' + CHAT_IDEA.type + ' called "' + CHAT_IDEA.title + '". Description: ' + CHAT_IDEA.description + '. Be specific and concise.',
      messages: CHAT_MSGS
    })
  }).then(function(r) { return r.json(); }).then(function(data) {
    var text = data.content && data.content.find(function(b) { return b.type === 'text'; });
    CHAT_MSGS.push({ role: 'assistant', content: text ? text.text : '…' });
    CHAT_LOADING = false;
    renderChat();
  }).catch(function(e) {
    CHAT_MSGS.push({ role: 'assistant', content: 'Error: ' + e.message });
    CHAT_LOADING = false;
    renderChat();
  });
}

function closeChat() { CHAT_IDEA = null; CHAT_MSGS = []; document.getElementById('croot').innerHTML = ''; }
function closeModal() { document.getElementById('mroot').innerHTML = ''; }

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

var PAL = ['#60d090','#f0c060','#a060e0','#60a0e0','#e06090','#60d0d0','#e09060','#d0e060'];
function tagColor(t) { var h = 0; for (var i = 0; i < t.length; i++) h = (h * 31 + t.charCodeAt(i)) % PAL.length; return PAL[h]; }
function tagBg(t) { return tagColor(t) + '18'; }

var toastTimer;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast on' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = 'toast'; }, 2800);
}
</script>
</body>
</html>
