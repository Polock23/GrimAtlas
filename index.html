<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Idea Vault" />
<link rel="manifest" href="manifest.json" />
<title>Idea Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0a0805; --bg2: #13100a; --bg3: #1c1710;
    --border: rgba(255,220,120,0.1); --border2: rgba(255,220,120,0.18);
    --gold: #f0c060; --gold2: #c89030;
    --text: #f0ead8; --text2: #9a9080; --text3: #6a6058;
    --green: #60d090; --red: #e06060; --blue: #60a0e0; --purple: #a060e0;
    --radius: 10px;
    --font-display: 'Cormorant Garamond', serif;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); }
  #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(ellipse at 30% 20%, rgba(240,192,96,0.06) 0%, transparent 60%), var(--bg); }
  .auth-box { width: 100%; max-width: 380px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 40px 36px; box-shadow: 0 24px 80px rgba(0,0,0,0.6); }
  .auth-logo { font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
  .auth-sub { font-size: 12px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 28px; }
  .auth-tabs { display: flex; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-family: var(--font-mono); cursor: pointer; background: transparent; border: none; color: var(--text3); transition: all 0.2s; }
  .auth-tab.active { background: rgba(240,192,96,0.12); color: var(--gold); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 5px; }
  .field input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: var(--font-ui); outline: none; }
  .field input:focus { border-color: var(--gold2); }
  .btn-primary { width: 100%; background: var(--gold); color: var(--bg); border: none; border-radius: 8px; padding: 12px; font-weight: 700; font-size: 14px; font-family: var(--font-ui); cursor: pointer; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-msg { margin-top: 10px; font-size: 12px; text-align: center; min-height: 18px; font-family: var(--font-mono); }
  .auth-msg.error { color: var(--red); }
  .auth-msg.success { color: var(--green); }
  #app { display: none; height: 100vh; flex-direction: column; }
  #app.visible { display: flex; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 0 20px; height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-logo { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--gold); flex: 1; }
  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; padding: 6px 14px; font-family: var(--font-mono); font-size: 12px; transition: all 0.15s; }
  .icon-btn:hover { border-color: var(--border2); color: var(--text); }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 240px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-section { padding: 16px 14px 8px; }
  .sidebar-label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; padding: 0 6px; }
  .folder-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; font-size: 13.5px; color: var(--text2); }
  .folder-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .folder-item.active { background: rgba(240,192,96,0.1); color: var(--gold); }
  .folder-item .count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
  .add-folder-btn { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--text3); font-family: var(--font-mono); background: none; border: none; width: 100%; transition: color 0.15s; }
  .add-folder-btn:hover { color: var(--gold); }
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .content-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .content-title { font-family: var(--font-display); font-size: 26px; font-weight: 700; flex: 1; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-pill { font-size: 11px; font-family: var(--font-mono); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--text3); cursor: pointer; background: transparent; transition: all 0.15s; }
  .filter-pill.active { border-color: var(--gold); color: var(--gold); background: rgba(240,192,96,0.1); }
  .search-wrap { margin-bottom: 16px; }
  .search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; color: var(--text); font-size: 13.5px; font-family: var(--font-ui); outline: none; }
  .search-wrap input::placeholder { color: var(--text3); }
  .idea-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px; position: relative; overflow: hidden; transition: border-color 0.2s; }
  .idea-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .idea-card[data-type="Video Game"]::before { background: var(--green); }
  .idea-card[data-type="Board Game"]::before { background: var(--gold); }
  .idea-card[data-type="Story"]::before { background: var(--purple); }
  .idea-card:hover { border-color: var(--border2); }
  .idea-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; }
  .idea-desc { font-size: 13.5px; color: var(--text2); line-height: 1.65; margin: 8px 0; }
  .idea-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .idea-tag { font-size: 11px; font-family: var(--font-mono); padding: 2px 9px; border-radius: 20px; }
  .idea-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .idea-btn { font-size: 11px; font-family: var(--font-mono); padding: 4px 12px; border-radius: 20px; cursor: pointer; border: 1px solid; background: transparent; transition: background 0.15s; }
  .idea-btn.ai { color: var(--gold); border-color: rgba(240,192,96,0.3); }
  .idea-btn.ai:hover { background: rgba(240,192,96,0.1); }
  .idea-btn.chat { color: var(--blue); border-color: rgba(96,160,224,0.3); }
  .idea-btn.chat:hover { background: rgba(96,160,224,0.1); }
  .idea-btn.edit { color: var(--text2); border-color: var(--border); }
  .idea-btn.edit:hover { background: rgba(255,255,255,0.05); }
  .idea-btn.del { color: var(--red); border-color: rgba(224,96,96,0.3); }
  .idea-btn.del:hover { background: rgba(224,96,96,0.1); }
  .idea-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .idea-expanded { margin-top: 14px; padding: 14px 16px; background: rgba(240,192,96,0.04); border: 1px solid rgba(240,192,96,0.12); border-radius: 8px; }
  .idea-expanded-label { font-size: 10px; font-family: var(--font-mono); color: var(--gold); letter-spacing: 1.5px; margin-bottom: 8px; }
  .idea-expanded-text { font-size: 13px; color: var(--text2); line-height: 1.75; white-space: pre-wrap; }
  .badge { display: inline-block; font-size: 10px; font-family: var(--font-mono); padding: 2px 8px; border-radius: 20px; }
  .badge.vg { color: var(--green); background: rgba(96,208,144,0.1); border: 1px solid rgba(96,208,144,0.2); }
  .badge.bg { color: var(--gold); background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.2); }
  .badge.st { color: var(--purple); background: rgba(160,96,224,0.1); border: 1px solid rgba(160,96,224,0.2); }
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-family: var(--font-display); font-size: 20px; color: var(--text2); margin-bottom: 6px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; box-shadow: 0 24px 80px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px; }
  .modal-field input, .modal-field textarea, .modal-field select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13.5px; font-family: var(--font-ui); outline: none; resize: vertical; }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color: var(--gold2); }
  .modal-field select option { background: var(--bg2); }
  .type-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text3); transition: all 0.15s; }
  .type-btn.sel-vg { border-color: var(--green) !important; color: var(--green) !important; background: rgba(96,208,144,0.1) !important; }
  .type-btn.sel-bg { border-color: var(--gold) !important; color: var(--gold) !important; background: rgba(240,192,96,0.1) !important; }
  .type-btn.sel-st { border-color: var(--purple) !important; color: var(--purple) !important; background: rgba(160,96,224,0.1) !important; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); padding: 9px 18px; font-family: var(--font-ui); font-size: 13px; cursor: pointer; }
  .btn-save { background: var(--gold); color: var(--bg); border: none; border-radius: 8px; padding: 9px 20px; font-weight: 700; font-size: 13px; font-family: var(--font-ui); cursor: pointer; }
  .chat-panel { position: fixed; inset: 0; z-index: 150; display: flex; align-items: flex-end; justify-content: center; padding: 16px; background: rgba(0,0,0,0.72); }
  .chat-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 580px; max-height: 82vh; display: flex; flex-direction: column; }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chat-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; flex: 1; }
  .chat-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { max-width: 88%; border-radius: 10px; padding: 10px 14px; font-size: 13.5px; line-height: 1.65; }
  .chat-msg.user { align-self: flex-end; background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.2); color: var(--gold); }
  .chat-msg.assistant { align-self: flex-start; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text2); white-space: pre-wrap; }
  .chat-msg.thinking { color: var(--text3); font-family: var(--font-mono); font-size: 12px; border: 1px dashed var(--border); align-self: flex-start; }
  .chat-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
  .chat-input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 13.5px; font-family: var(--font-ui); outline: none; }
  .chat-send { background: var(--gold); color: var(--bg); border: none; border-radius: 8px; padding: 9px 16px; font-weight: 700; font-size: 16px; cursor: pointer; }
  .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 20px; font-size: 13px; font-family: var(--font-mono); color: var(--text2); z-index: 999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { color: var(--green); }
  .toast.error { color: var(--red); }
  @media (max-width: 640px) { .sidebar { display: none; } .content { padding: 16px; } }
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Idea Vault</div>
    <div class="auth-sub">Creative Ideas Manager</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" /></div>
    <div class="field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Sign In</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Idea Vault ✦</div>
    <button class="icon-btn" onclick="doSignOut()">Sign Out</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Folders</div>
        <div id="folder-list"></div>
        <button class="add-folder-btn" onclick="openFolderModal()">+ New Folder</button>
      </div>
    </div>
    <div class="content">
      <div class="content-header">
        <div class="content-title" id="content-title">All Ideas</div>
        <button class="icon-btn" onclick="openIdeaModal()">+ Add Idea</button>
      </div>
      <div class="search-wrap"><input type="text" id="search-input" placeholder="Search ideas…" oninput="renderIdeas()" /></div>
      <div class="filters">
        <button class="filter-pill active" data-type="All" onclick="setFilter('All')">All Types</button>
        <button class="filter-pill" data-type="Video Game" onclick="setFilter('Video Game')">🎮 Video Game</button>
        <button class="filter-pill" data-type="Board Game" onclick="setFilter('Board Game')">♟️ Board Game</button>
        <button class="filter-pill" data-type="Story" onclick="setFilter('Story')">📖 Story</button>
      </div>
      <div id="ideas-grid"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<div id="chat-root"></div>
<script>
const SUPA_URL='https://uedwjzojbrkcedckwxbr.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZHdqem9qYnJrY2VkY2t3eGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MjMxMjUsImV4cCI6MjA5NDI5OTEyNX0.2YRvP83u2MBtjdbFKfnqOQNbnoE_O0tz0XA8my_iQPU';
const CLAUDE='claude-sonnet-4-20250514';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let USER=null,FOLDERS=[],IDEAS=[],ACTIVE_FOLDER=null,TYPE_FILTER='All',EXPANDING=null;
let SELECTED_TYPE='Video Game',SELECTED_ICON='📁',EDITING_IDEA=null,EDITING_FOLDER=null;
let CHAT_IDEA=null,CHAT_MSGS=[],CHAT_LOADING=false;
let authTab='login';
function switchTab(tab){authTab=tab;document.getElementById('tab-login').classList.toggle('active',tab==='login');document.getElementById('tab-signup').classList.toggle('active',tab==='signup');document.getElementById('auth-btn').textContent=tab==='login'?'Sign In':'Create Account';document.getElementById('auth-msg').textContent='';}
async function doAuth(){const email=document.getElementById('auth-email').value.trim();const pass=document.getElementById('auth-password').value;const btn=document.getElementById('auth-btn');if(!email||!pass){setMsg('Please fill in both fields.','error');return;}btn.disabled=true;try{const fn=authTab==='login'?sb.auth.signInWithPassword.bind(sb.auth):sb.auth.signUp.bind(sb.auth);const{data,error}=await fn({email,password:pass});if(error)throw error;if(authTab==='signup'&&!data.session)setMsg('Check your email to confirm.','success');}catch(e){setMsg(e.message||'Something went wrong.','error');}btn.disabled=false;}
function setMsg(text,type){const el=document.getElementById('auth-msg');el.textContent=text;el.className='auth-msg '+(type||'');}
async function doSignOut(){await sb.auth.signOut();USER=null;FOLDERS=[];IDEAS=[];document.getElementById('app').classList.remove('visible');document.getElementById('auth-screen').style.display='flex';}
sb.auth.onAuthStateChange(async(_event,session)=>{if(session?.user){USER=session.user;document.getElementById('auth-screen').style.display='none';document.getElementById('app').classList.add('visible');await loadAll();}});
async function loadAll(){await Promise.all([loadFolders(),loadIdeas()]);renderSidebar();renderIdeas();}
async function loadFolders(){const{data,error}=await sb.from('folders').select('*').eq('user_id',USER.id).order('created_at');if(error)console.error('loadFolders:',error);else FOLDERS=data||[];}
async function loadIdeas(){const{data,error}=await sb.from('ideas').select('*').eq('user_id',USER.id).order('created_at',{ascending:false});if(error)console.error('loadIdeas:',error);else IDEAS=data||[];}
function renderSidebar(){let html='<div class="folder-item '+(ACTIVE_FOLDER===null?'active':'')+'" onclick="setFolder(null)"><span>📂</span><span style="flex:1">All Ideas</span><span class="count">'+IDEAS.length+'</span></div>';FOLDERS.forEach(f=>{const count=IDEAS.filter(i=>i.folder_id===f.id).length;html+='<div class="folder-item '+(ACTIVE_FOLDER===f.id?'active':'')+'" onclick="setFolder(\''+f.id+'\')"><span>'+(f.icon||'📁')+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.name)+'</span><span class="count">'+count+'</span></div>';});document.getElementById('folder-list').innerHTML=html;document.getElementById('content-title').textContent=ACTIVE_FOLDER===null?'All Ideas':(FOLDERS.find(f=>f.id===ACTIVE_FOLDER)?.name||'Folder');}
function setFolder(id){ACTIVE_FOLDER=id;renderSidebar();renderIdeas();}
function setFilter(type){TYPE_FILTER=type;document.querySelectorAll('.filter-pill').forEach(p=>p.classList.toggle('active',p.dataset.type===type));renderIdeas();}
function renderIdeas(){const search=(document.getElementById('search-input')?.value||'').toLowerCase();let list=IDEAS;if(ACTIVE_FOLDER!==null)list=list.filter(i=>i.folder_id===ACTIVE_FOLDER);if(TYPE_FILTER!=='All')list=list.filter(i=>i.type===TYPE_FILTER);if(search)list=list.filter(i=>i.title.toLowerCase().includes(search)||(i.description||'').toLowerCase().includes(search));const grid=document.getElementById('ideas-grid');if(!grid)return;if(list.length===0){grid.innerHTML='<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">No ideas here yet</div></div>';return;}const typeMap={'Video Game':['🎮','vg'],'Board Game':['♟️','bg'],'Story':['📖','st']};grid.innerHTML=list.map(idea=>{const[icon,cls]=typeMap[idea.type]||['💡','vg'];const tags=(idea.tags||[]).map(t=>'<span class="idea-tag" style="background:'+tagBg(t)+';color:'+tagColor(t)+';border:1px solid '+tagColor(t)+'44">#'+esc(t)+'</span>').join('');const folder=FOLDERS.find(f=>f.id===idea.folder_id);const expanded=idea.expanded_content?'<div class="idea-expanded"><div class="idea-expanded-label">✦ AI Expansion</div><div class="idea-expanded-text">'+esc(idea.expanded_content)+'</div></div>':'';return '<div class="idea-card" data-type="'+esc(idea.type)+'"><div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px"><span style="font-size:20px">'+icon+'</span><span class="idea-title">'+esc(idea.title)+'</span><span class="badge '+cls+'">'+idea.type+'</span>'+(folder?'<span style="font-size:10px;font-family:var(--font-mono);color:var(--text3)">📁 '+esc(folder.name)+'</span>':'')+'</div><div class="idea-desc">'+esc(idea.description||'')+'</div>'+(tags?'<div class="idea-tags">'+tags+'</div>':'')+'<div class="idea-actions"><button class="idea-btn ai" onclick="expandIdea(\''+idea.id+'\')" '+(EXPANDING===idea.id?'disabled':'')+'>'+(EXPANDING===idea.id?'Thinking…':idea.expanded_content?'Re-expand ✦':'Expand with AI ✦')+'</button><button class="idea-btn chat" onclick="openChat(\''+idea.id+'\')">💬 Chat</button><button class="idea-btn edit" onclick="openIdeaModal(\''+idea.id+'\')">Edit</button><button class="idea-btn del" onclick="deleteIdea(\''+idea.id+'\')">Delete</button></div>'+expanded+'</div>';}).join('');}
const ICONS=['📁','🎮','♟️','📖','🌌','⚔️','🧠','🌊','🏔️','🔮','🌿','💡','🎲','🎭','🚀'];
function openFolderModal(id){EDITING_FOLDER=id?FOLDERS.find(f=>f.id===id):null;SELECTED_ICON=EDITING_FOLDER?.icon||'📁';document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">'+(EDITING_FOLDER?'Edit Folder':'New Folder')+'</div><div class="modal-field"><label>Name</label><input type="text" id="f-name" value="'+(EDITING_FOLDER?esc(EDITING_FOLDER.name):'')+'" placeholder="e.g. Sci-Fi Games" /></div><div class="modal-field"><label>Icon</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">'+ICONS.map(ic=>'<button onclick="pickIcon(\''+ic+'\')" id="ic-'+ic+'" style="font-size:20px;background:none;border:2px solid '+(ic===SELECTED_ICON?'var(--gold)':'var(--border)')+';border-radius:8px;padding:5px 8px;cursor:pointer">'+ic+'</button>').join('')+'</div></div><div class="modal-footer"><button class="btn-ghost" onclick="closeModal()">Cancel</button>'+(EDITING_FOLDER?'<button class="btn-ghost" style="color:var(--red)" onclick="deleteFolder(\''+EDITING_FOLDER.id+'\')">Delete</button>':'')+'<button class="btn-save" onclick="saveFolder()">Save</button></div></div></div>';}
function pickIcon(ic){SELECTED_ICON=ic;ICONS.forEach(i=>{const el=document.getElementById('ic-'+i);if(el)el.style.borderColor=i===ic?'var(--gold)':'var(--border)';});}
async function saveFolder(){const name=document.getElementById('f-name')?.value?.trim();if(!name){alert('Please enter a folder name.');return;}if(!USER){alert('Not signed in.');return;}if(EDITING_FOLDER){const{error}=await sb.from('folders').update({name,icon:SELECTED_ICON}).eq('id',EDITING_FOLDER.id);if(error){alert('Error: '+error.message);return;}}else{const{error}=await sb.from('folders').insert({name,icon:SELECTED_ICON,user_id:USER.id});if(error){alert('Error: '+error.message);return;}}closeModal();await loadAll();toast('Folder saved ✦','success');}
async function deleteFolder(id){if(!confirm('Delete this folder?'))return;await sb.from('ideas').update({folder_id:null}).eq('folder_id',id);await sb.from('folders').delete().eq('id',id);closeModal();ACTIVE_FOLDER=null;await loadAll();toast('Folder deleted');}
function openIdeaModal(id){EDITING_IDEA=id?IDEAS.find(i=>i.id===id):null;SELECTED_TYPE=EDITING_IDEA?.type||'Video Game';const types=['Video Game','Board Game','Story'];const icons={'Video Game':'🎮','Board Game':'♟️','Story':'📖'};document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">'+(EDITING_IDEA?'Edit Idea':'New Idea')+'</div><div class="modal-field"><label>Title</label><input type="text" id="i-title" value="'+(EDITING_IDEA?esc(EDITING_IDEA.title):'')+'" placeholder="Give your idea a name…" /></div><div class="modal-field"><label>Type</label><div class="type-btns">'+types.map(t=>'<button class="type-btn" id="tb-'+t.replace(/ /g,\'-\')+'" onclick="pickType(\''+t+'\')">'+icons[t]+' '+t+'</button>').join('')+'</div></div><div class="modal-field"><label>Description</label><textarea id="i-desc" rows="4" placeholder="What\'s the core concept?">'+(EDITING_IDEA?esc(EDITING_IDEA.description||''):'')+'</textarea></div><div class="modal-field"><label>Tags <span style="color:var(--text3)">(comma separated)</span></label><input type="text" id="i-tags" value="'+(EDITING_IDEA?(EDITING_IDEA.tags||[]).join(\', \'):'')+'" placeholder="e.g. sci-fi, roguelike, co-op" /></div><div class="modal-field"><label>Folder</label><select id="i-folder"><option value="">— No folder —</option>'+FOLDERS.map(f=>'<option value="'+f.id+'"'+(EDITING_IDEA?.folder_id===f.id?\' selected\':\'\')+'>'+esc(f.name)+'</option>').join('')+'</select></div><div class="modal-footer"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveIdea()">Save Idea</button></div></div></div>';pickType(SELECTED_TYPE);}
function pickType(t){SELECTED_TYPE=t;const clsMap={'Video Game':'sel-vg','Board Game':'sel-bg','Story':'sel-st'};['Video Game','Board Game','Story'].forEach(x=>{const el=document.getElementById('tb-'+x.replace(/ /g,'-'));if(el)el.className='type-btn'+(x===t?' '+clsMap[x]:'');});}
async function saveIdea(){const title=document.getElementById('i-title')?.value?.trim();const desc=document.getElementById('i-desc')?.value?.trim()||'';const tagsRaw=document.getElementById('i-tags')?.value||'';const folder_id=document.getElementById('i-folder')?.value||null;const tags=tagsRaw.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);if(!title){alert('Please enter a title.');return;}if(!USER){alert('Not signed in.');return;}const payload={title,type:SELECTED_TYPE,description:desc,tags,folder_id,user_id:USER.id};if(EDITING_IDEA){const{error}=await sb.from('ideas').update(payload).eq('id',EDITING_IDEA.id);if(error){alert('Error: '+error.message);return;}}else{const{error}=await sb.from('ideas').insert(payload);if(error){alert('Error: '+error.message);return;}}closeModal();await loadAll();toast('Idea saved ✦','success');}
async function deleteIdea(id){if(!confirm('Delete this idea?'))return;await sb.from('ideas').delete().eq('id',id);await loadAll();toast('Idea deleted');}                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
async function expandIdea(id){const idea=IDEAS.find(i=>i.id===id);if(!idea)return;EXPANDING=id;renderIdeas();try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:CLAUDE,max_tokens:1000,system:'You are a creative collaborator. Given a game or story idea, provide: Core mechanics or plot hooks (3-4 bullets), Unique selling point, One key challenge, Elevator pitch (one sentence). Under 250 words. Plain text only.',messages:[{role:'user',content:'Title: '+idea.title+'\nType: '+idea.type+'\nDescription: '+idea.description+'\nTags: '+(idea.tags||[]).join(', ')}]})});const data=await res.json();const text=data.content?.find(b=>b.type==='text')?.text||'Could not expand.';await sb.from('ideas').update({expanded_content:text}).eq('id',id);await loadIdeas();}catch(e){toast('Expansion failed: '+e.message,'error');}EXPANDING=null;renderIdeas();}
function openChat(id){CHAT_IDEA=IDEAS.find(i=>i.id===id);CHAT_MSGS=[];renderChat();}
function renderChat(){if(!CHAT_IDEA){document.getElementById('chat-root').innerHTML='';return;}const msgs=CHAT_MSGS.map(m=>'<div class="chat-msg '+m.role+'">'+esc(m.content)+'</div>').join('');document.getElementById('chat-root').innerHTML='<div class="chat-panel" onclick="if(event.target===this)closeChat()"><div class="chat-box" onclick="event.stopPropagation()"><div class="chat-header"><div class="chat-title">💬 '+esc(CHAT_IDEA.title)+'</div><button class="chat-close" onclick="closeChat()">✕</button></div><div class="chat-messages" id="chat-msgs">'+(msgs||'<div style="color:var(--text3);font-size:12px;font-family:var(--font-mono);text-align:center;margin-top:20px">Ask anything about this idea…</div>')+(CHAT_LOADING?'<div class="chat-msg thinking">Thinking…</div>':'')+'</div><div class="chat-input-row"><input class="chat-input" id="chat-input" placeholder="Ask something…" onkeydown="if(event.key===\'Enter\')sendChat()" /><button class="chat-send" onclick="sendChat()" '+(CHAT_LOADING?'disabled':'')+'>→</button></div></div></div>';const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;setTimeout(()=>document.getElementById('chat-input')?.focus(),50);}
async function sendChat(){const input=document.getElementById('chat-input');const text=input?.value?.trim();if(!text||CHAT_LOADING)return;CHAT_MSGS.push({role:'user',content:text});CHAT_LOADING=true;renderChat();try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:CLAUDE,max_tokens:1000,system:'You are a creative collaborator helping develop a '+CHAT_IDEA.type+' called "'+CHAT_IDEA.title+'". Description: '+CHAT_IDEA.description+'. Be specific and concise.',messages:CHAT_MSGS})});const data=await res.json();const reply=data.content?.find(b=>b.type==='text')?.text||'…';CHAT_MSGS.push({role:'assistant',content:reply});}catch(e){CHAT_MSGS.push({role:'assistant',content:'Error: '+e.message});}CHAT_LOADING=false;renderChat();}
function closeChat(){CHAT_IDEA=null;CHAT_MSGS=[];document.getElementById('chat-root').innerHTML='';}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const PAL=['#60d090','#f0c060','#a060e0','#60a0e0','#e06090','#60d0d0','#e09060','#d0e060'];
function tagColor(t){let h=0;for(const c of t)h=(h*31+c.charCodeAt(0))%PAL.length;return PAL[h];}
function tagBg(t){return tagColor(t)+'18';}
let toastTimer;
function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}
</script>
</body>
