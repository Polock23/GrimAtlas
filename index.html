<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0805" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Idea Vault" />
<link rel="manifest" href="manifest.json" />
<title>Idea Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0a0805;
    --bg2: #13100a;
    --bg3: #1c1710;
    --border: rgba(255,220,120,0.1);
    --border2: rgba(255,220,120,0.18);
    --gold: #f0c060;
    --gold2: #c89030;
    --text: #f0ead8;
    --text2: #9a9080;
    --text3: #6a6058;
    --green: #60d090;
    --red: #e06060;
    --blue: #60a0e0;
    --purple: #a060e0;
    --radius: 10px;
    --font-display: 'Cormorant Garamond', serif;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); }
  body { overflow-x: hidden; }

  /* Noise texture overlay */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  /* Auth screen */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background: radial-gradient(ellipse at 30% 20%, rgba(240,192,96,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(96,160,224,0.04) 0%, transparent 50%),
                var(--bg);
  }
  .auth-box {
    width: 100%; max-width: 380px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 16px; padding: 40px 36px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,220,120,0.08);
  }
  .auth-logo { font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--gold); letter-spacing: -0.5px; margin-bottom: 4px; }
  .auth-sub { font-size: 12px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 32px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-family: var(--font-mono); cursor: pointer; background: transparent; border: none; color: var(--text3); transition: all 0.2s; }
  .auth-tab.active { background: rgba(240,192,96,0.12); color: var(--gold); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: var(--font-ui); outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--gold2); }
  .btn-primary { width: 100%; background: var(--gold); color: var(--bg); border: none; border-radius: 8px; padding: 12px; font-weight: 700; font-size: 14px; font-family: var(--font-ui); cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.5px; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .auth-msg { margin-top: 12px; font-size: 12px; text-align: center; min-height: 18px; }
  .auth-msg.error { color: var(--red); }
  .auth-msg.success { color: var(--green); }

  /* App layout */
  #app { display: none; height: 100vh; flex-direction: column; }
  #app.visible { display: flex; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 12px; padding: 0 20px;
    height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: sticky; top: 0; z-index: 50;
  }
  .topbar-logo { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--gold); flex-shrink: 0; }
  .topbar-spacer { flex: 1; }
  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; padding: 6px 10px; font-size: 16px; transition: all 0.15s; display: flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 12px; }
  .icon-btn:hover { border-color: var(--border2); color: var(--text); }

  /* Main area */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 240px; flex-shrink: 0; background: var(--bg2);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    overflow-y: auto; transition: transform 0.25s;
  }
  .sidebar-section { padding: 16px 14px 8px; }
  .sidebar-label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; padding: 0 6px; }
  .folder-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 8px; cursor: pointer; transition: background 0.15s;
    font-size: 13.5px; color: var(--text2); position: relative;
  }
  .folder-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .folder-item.active { background: rgba(240,192,96,0.1); color: var(--gold); }
  .folder-item .count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
  .folder-icon { font-size: 15px; }
  .add-folder-btn { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--text3); font-family: var(--font-mono); transition: color 0.15s; background: none; border: none; width: 100%; }
  .add-folder-btn:hover { color: var(--gold); }

  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .content-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .content-title { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--text); }
  .content-actions { margin-left: auto; display: flex; gap: 8px; }

  /* Filters */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-pill { font-size: 11px; font-family: var(--font-mono); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--text3); cursor: pointer; background: transparent; transition: all 0.15s; }
  .filter-pill:hover { border-color: var(--border2); color: var(--text2); }
  .filter-pill.active { border-color: var(--gold); color: var(--gold); background: rgba(240,192,96,0.1); }

  /* Search */
  .search-wrap { margin-bottom: 20px; }
  .search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; color: var(--text); font-size: 13.5px; font-family: var(--font-ui); outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--gold2); }
  .search-wrap input::placeholder { color: var(--text3); }

  /* Idea cards */
  .ideas-grid { display: flex; flex-direction: column; gap: 12px; }
  .idea-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .idea-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .idea-card[data-type="Video Game"]::before { background: var(--green); }
  .idea-card[data-type="Board Game"]::before { background: var(--gold); }
  .idea-card[data-type="Story"]::before { background: var(--purple); }
  .idea-card:hover { border-color: var(--border2); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .idea-card-top { display: flex; align-items: flex-start; gap: 12px; }
  .idea-type-icon { font-size: 20px; line-height: 1; margin-top: 2px; flex-shrink: 0; }
  .idea-body { flex: 1; min-width: 0; }
  .idea-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .idea-type-badge { display: inline-block; font-size: 10px; font-family: var(--font-mono); padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; }
  .idea-type-badge.vg { color: var(--green); background: rgba(96,208,144,0.1); border: 1px solid rgba(96,208,144,0.2); }
  .idea-type-badge.bg { color: var(--gold); background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.2); }
  .idea-type-badge.st { color: var(--purple); background: rgba(160,96,224,0.1); border: 1px solid rgba(160,96,224,0.2); }
  .idea-desc { font-size: 13.5px; color: var(--text2); line-height: 1.65; margin-bottom: 10px; }
  .idea-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .idea-tag { font-size: 11px; font-family: var(--font-mono); padding: 2px 9px; border-radius: 20px; }
  .idea-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .idea-btn { font-size: 11px; font-family: var(--font-mono); padding: 4px 12px; border-radius: 20px; cursor: pointer; border: 1px solid; transition: background 0.15s; background: transparent; }
  .idea-btn.ai { color: var(--gold); border-color: rgba(240,192,96,0.3); }
  .idea-btn.ai:hover { background: rgba(240,192,96,0.1); }
  .idea-btn.chat { color: var(--blue); border-color: rgba(96,160,224,0.3); }
  .idea-btn.chat:hover { background: rgba(96,160,224,0.1); }
  .idea-btn.edit { color: var(--text2); border-color: var(--border); }
  .idea-btn.edit:hover { background: rgba(255,255,255,0.05); }
  .idea-btn.del { color: var(--red); border-color: rgba(224,96,96,0.3); }
  .idea-btn.del:hover { background: rgba(224,96,96,0.1); }
  .idea-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .idea-expanded {
    margin-top: 14px; padding: 14px 16px;
    background: rgba(240,192,96,0.04); border: 1px solid rgba(240,192,96,0.12);
    border-radius: 8px;
  }
  .idea-expanded-label { font-size: 10px; font-family: var(--font-mono); color: var(--gold); letter-spacing: 1.5px; margin-bottom: 8px; }
  .idea-expanded-text { font-size: 13px; color: var(--text2); line-height: 1.75; white-space: pre-wrap; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-family: var(--font-display); font-size: 20px; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; font-family: var(--font-mono); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 16px; padding: 28px; width: 100%; max-width: 520px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px; }
  .modal-field input, .modal-field textarea, .modal-field select {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13.5px;
    font-family: var(--font-ui); outline: none; transition: border-color 0.2s; resize: vertical;
  }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color: var(--gold2); }
  .modal-field select option { background: var(--bg2); }
  .type-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text3); transition: all 0.15s; }
  .type-btn.active-vg { border-color: var(--green); color: var(--green); background: rgba(96,208,144,0.1); }
  .type-btn.active-bg { border-color: var(--gold); color: var(--gold); background: rgba(240,192,96,0.1); }
  .type-btn.active-st { border-color: var(--purple); color: var(--purple); background: rgba(160,96,224,0.1); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); padding: 9px 18px; font-family: var(--font-ui); font-size: 13px; cursor: pointer; }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-save { background: var(--gold); color: var(--bg); border: none; border-radius: 8px; padding: 9px 20px; font-weight: 700; font-size: 13px; font-family: var(--font-ui); cursor: pointer; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Chat panel */
  .chat-panel {
    position: fixed; inset: 0; z-index: 150; display: flex; align-items: flex-end; justify-content: center;
    padding: 16px; background: rgba(0,0,0,0.72); backdrop-filter: blur(4px);
  }
  .chat-box {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px;
    width: 100%; max-width: 580px; max-height: 82vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chat-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; flex: 1; }
  .chat-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 2px 6px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .chat-empty { color: var(--text3); font-size: 12px; font-family: var(--font-mono); text-align: center; margin-top: 24px; }
  .chat-msg { max-width: 88%; border-radius: 10px; padding: 10px 14px; font-size: 13.5px; line-height: 1.65; }
  .chat-msg.user { align-self: flex-end; background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.2); color: var(--gold); font-family: var(--font-ui); }
  .chat-msg.assistant { align-self: flex-start; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text2); font-family: var(--font-ui); white-space: pre-wrap; }
  .chat-msg.thinking { color: var(--text3); font-family: var(--font-mono); font-size: 12px; border: 1px dashed var(--border); }
  .chat-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
  .chat-input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-size: 13.5px; font-family: var(--font-ui); outline: none; }
  .chat-input:focus { border-color: var(--gold2); }
  .chat-send { background: var(--gold); color: var(--bg); border: none; border-radius: 8px; padding: 9px 16px; font-weight: 700; font-size: 16px; cursor: pointer; flex-shrink: 0; }
  .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Mobile sidebar toggle */
  .sidebar-toggle { display: none; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
    padding: 10px 20px; font-size: 13px; font-family: var(--font-mono); color: var(--text2);
    z-index: 999; transition: transform 0.3s; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { color: var(--green); border-color: rgba(96,208,144,0.3); }
  .toast.error { color: var(--red); border-color: rgba(224,96,96,0.3); }

  @media (max-width: 640px) {
    .sidebar { position: fixed; left: 0; top: 56px; bottom: 0; z-index: 40; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: flex; }
    .content { padding: 16px; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Idea Vault</div>
    <div class="auth-sub">Creative Ideas Manager</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" />
    </div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Sign In</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <button class="icon-btn sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="topbar-logo">Idea Vault ✦</div>
    <div class="topbar-spacer"></div>
    <button class="icon-btn" onclick="signOut()">Sign out</button>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Folders</div>
        <div id="folder-list"></div>
        <button class="add-folder-btn" onclick="openFolderModal()">+ New Folder</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <div class="content-header">
        <div class="content-title" id="content-title">All Ideas</div>
        <div class="content-actions">
          <button class="icon-btn" onclick="openIdeaModal()">+ Add Idea</button>
        </div>
      </div>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search ideas…" oninput="renderIdeas()" />
      </div>
      <div class="filters" id="filters">
        <button class="filter-pill active" data-type="All" onclick="setTypeFilter('All')">All Types</button>
        <button class="filter-pill" data-type="Video Game" onclick="setTypeFilter('Video Game')">🎮 Video Game</button>
        <button class="filter-pill" data-type="Board Game" onclick="setTypeFilter('Board Game')">♟️ Board Game</button>
        <button class="filter-pill" data-type="Story" onclick="setTypeFilter('Story')">📖 Story</button>
      </div>
      <div class="ideas-grid" id="ideas-grid"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modals injected by JS -->
<div id="modal-container"></div>
<!-- Chat panel injected by JS -->
<div id="chat-container"></div>

<script>
const SUPABASE_URL = 'https://uedwjzojbrkcedckwxbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZHdqem9qYnJrY2VkY2t3eGJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MjMxMjUsImV4cCI6MjA5NDI5OTEyNX0.2YRvP83u2MBtjdbFKfnqOQNbnoE_O0tz0XA8my_iQPU';
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  user: null,
  folders: [],
  ideas: [],
  activeFolder: null, // null = All
  typeFilter: 'All',
  expandingId: null,
  chatIdea: null,
  chatMessages: [],
  chatLoading: false,
  editingIdea: null,
  editingFolder: null,
};

// ── Auth ──────────────────────────────────────────────────────────────
let authTab = 'login';
function switchTab(tab) {
  authTab = tab;
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('auth-btn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-msg').textContent = '';
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const msg = document.getElementById('auth-msg');
  const btn = document.getElementById('auth-btn');
  if (!email || !password) { msg.textContent = 'Please fill in both fields.'; msg.className = 'auth-msg error'; return; }
  btn.disabled = true; msg.textContent = ''; msg.className = 'auth-msg';
  try {
    let res;
    if (authTab === 'login') {
      res = await sb.auth.signInWithPassword({ email, password });
    } else {
      res = await sb.auth.signUp({ email, password });
    }
    if (res.error) throw res.error;
    if (authTab === 'signup' && !res.data.session) {
      msg.textContent = 'Check your email to confirm your account.';
      msg.className = 'auth-msg success';
    }
  } catch(e) {
    msg.textContent = e.message || 'Something went wrong.';
    msg.className = 'auth-msg error';
  }
  btn.disabled = false;
}

async function signOut() {
  await sb.auth.signOut();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
  state.user = null; state.folders = []; state.ideas = [];
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    state.user = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    await ensureSchema();
    await loadAll();
  }
});

// ── Schema bootstrap ──────────────────────────────────────────────────
async function ensureSchema() {
  // Create tables via RPC if they don't exist — we use raw SQL through supabase
  // Tables must be created manually or via migration; we'll handle gracefully
}

// ── Data loading ──────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadFolders(), loadIdeas()]);
  renderSidebar();
  renderIdeas();
}

async function loadFolders() {
  const { data, error } = await sb.from('folders').select('*').eq('user_id', state.user.id).order('created_at');
  if (!error) state.folders = data || [];
}

async function loadIdeas() {
  const { data, error } = await sb.from('ideas').select('*').eq('user_id', state.user.id).order('created_at', { ascending: false });
  if (!error) state.ideas = data || [];
}

// ── Sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('folder-list');
  const allCount = state.ideas.length;
  let html = `
    <div class="folder-item ${state.activeFolder === null ? 'active' : ''}" onclick="setFolder(null)">
      <span class="folder-icon">📂</span> All Ideas
      <span class="count">${allCount}</span>
    </div>`;
  for (const f of state.folders) {
    const count = state.ideas.filter(i => i.folder_id === f.id).length;
    html += `
      <div class="folder-item ${state.activeFolder === f.id ? 'active' : ''}" onclick="setFolder('${f.id}')">
        <span class="folder-icon">${f.icon || '📁'}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
        <span class="count">${count}</span>
      </div>`;
  }
  list.innerHTML = html;
  document.getElementById('content-title').textContent =
    state.activeFolder === null ? 'All Ideas' :
    (state.folders.find(f => f.id === state.activeFolder)?.name || 'Folder');
}

function setFolder(id) {
  state.activeFolder = id;
  renderSidebar();
  renderIdeas();
  if (window.innerWidth <= 640) document.getElementById('sidebar').classList.remove('open');
}

function setTypeFilter(type) {
  state.typeFilter = type;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.type === type));
  renderIdeas();
}

// ── Ideas rendering ───────────────────────────────────────────────────
function renderIdeas() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let ideas = state.ideas;
  if (state.activeFolder !== null) ideas = ideas.filter(i => i.folder_id === state.activeFolder);
  if (state.typeFilter !== 'All') ideas = ideas.filter(i => i.type === state.typeFilter);
  if (search) ideas = ideas.filter(i => i.title.toLowerCase().includes(search) || (i.description||'').toLowerCase().includes(search));

  const grid = document.getElementById('ideas-grid');
  if (ideas.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">No ideas here yet</div><div class="empty-sub">Add your first idea above</div></div>`;
    return;
  }

  const typeMap = { 'Video Game': ['🎮','vg'], 'Board Game': ['♟️','bg'], 'Story': ['📖','st'] };
  grid.innerHTML = ideas.map(idea => {
    const [icon, cls] = typeMap[idea.type] || ['💡','vg'];
    const tags = (idea.tags || []).map(t => `<span class="idea-tag" style="background:${tagBg(t)};color:${tagColor(t)};border:1px solid ${tagColor(t)}44">#${esc(t)}</span>`).join('');
    const expanded = idea.expanded_content ? `
      <div class="idea-expanded">
        <div class="idea-expanded-label">✦ AI Expansion</div>
        <div class="idea-expanded-text">${esc(idea.expanded_content)}</div>
      </div>` : '';
    const folderName = state.folders.find(f => f.id === idea.folder_id)?.name || '';
    const folderBadge = folderName ? `<span style="font-size:10px;font-family:var(--font-mono);color:var(--text3);margin-left:6px">📁 ${esc(folderName)}</span>` : '';
    return `
      <div class="idea-card" data-type="${esc(idea.type)}" id="card-${idea.id}">
        <div class="idea-card-top">
          <div class="idea-type-icon">${icon}</div>
          <div class="idea-body">
            <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:4px">
              <div class="idea-title">${esc(idea.title)}</div>
              <span class="idea-type-badge ${cls}">${idea.type}</span>
              ${folderBadge}
            </div>
            <div class="idea-desc">${esc(idea.description || '')}</div>
            ${tags ? `<div class="idea-tags">${tags}</div>` : ''}
            <div class="idea-actions">
              <button class="idea-btn ai" onclick="expandIdea('${idea.id}')" ${state.expandingId === idea.id ? 'disabled' : ''}>
                ${state.expandingId === idea.id ? 'Thinking…' : idea.expanded_content ? 'Re-expand ✦' : 'Expand with AI ✦'}
              </button>
              <button class="idea-btn chat" onclick="openChat('${idea.id}')">💬 Chat</button>
              <button class="idea-btn edit" onclick="openIdeaModal('${idea.id}')">Edit</button>
              <button class="idea-btn del" onclick="deleteIdea('${idea.id}')">Delete</button>
            </div>
            ${expanded}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Folder modal ──────────────────────────────────────────────────────
const FOLDER_ICONS = ['📁','🎮','♟️','📖','🌌','⚔️','🧠','🌊','🏔️','🔮','🌿','💡','🎲','🎭','🚀'];

function openFolderModal(id) {
  const folder = id ? state.folders.find(f => f.id === id) : null;
  state.editingFolder = folder;
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">${folder ? 'Edit Folder' : 'New Folder'}</div>
        <div class="modal-field">
          <label>Folder Name</label>
          <input type="text" id="f-name" value="${folder ? esc(folder.name) : ''}" placeholder="e.g. Sci-Fi Games" />
        </div>
        <div class="modal-field">
          <label>Icon</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px" id="icon-picker">
            ${FOLDER_ICONS.map(ic => `<button onclick="selectIcon('${ic}')" style="font-size:20px;background:none;border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;transition:all 0.15s" id="ico-${ic}">${ic}</button>`).join('')}
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          ${folder ? `<button class="btn-ghost" style="color:var(--red);border-color:rgba(224,96,96,0.3)" onclick="deleteFolder('${folder.id}')">Delete</button>` : ''}
          <button class="btn-save" onclick="saveFolder()">Save</button>
        </div>
      </div>
    </div>`;
  selectedIcon = folder?.icon || '📁';
  updateIconPicker();
}

let selectedIcon = '📁';
function selectIcon(ic) { selectedIcon = ic; updateIconPicker(); }
function updateIconPicker() {
  FOLDER_ICONS.forEach(ic => {
    const el = document.getElementById(`ico-${ic}`);
    if (el) el.style.borderColor = ic === selectedIcon ? 'var(--gold)' : 'var(--border)';
  });
}

async function saveFolder() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  if (state.editingFolder) {
    const { error } = await sb.from('folders').update({ name, icon: selectedIcon }).eq('id', state.editingFolder.id);
    if (error) { toast('Error saving folder', 'error'); return; }
  } else {
    const { error } = await sb.from('folders').insert({ name, icon: selectedIcon, user_id: state.user.id });
    if (error) { toast('Error creating folder', 'error'); return; }
  }
  closeModal(); await loadAll(); toast('Folder saved ✦', 'success');
}

async function deleteFolder(id) {
  if (!confirm('Delete this folder? Ideas inside will move to All Ideas.')) return;
  await sb.from('ideas').update({ folder_id: null }).eq('folder_id', id);
  await sb.from('folders').delete().eq('id', id);
  closeModal(); state.activeFolder = null; await loadAll(); toast('Folder deleted');
}

// ── Idea modal ────────────────────────────────────────────────────────
function openIdeaModal(id) {
  const idea = id ? state.ideas.find(i => i.id === id) : null;
  state.editingIdea = idea;
  const types = ['Video Game','Board Game','Story'];
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">${idea ? 'Edit Idea' : 'New Idea'}</div>
        <div class="modal-field">
          <label>Title</label>
          <input type="text" id="i-title" value="${idea ? esc(idea.title) : ''}" placeholder="Give your idea a name…" />
        </div>
        <div class="modal-field">
          <label>Type</label>
          <div class="type-btns">
            ${types.map(t => {
              const cls = t==='Video Game'?'vg':t==='Board Game'?'bg':'st';
              const active = (idea?.type||'Video Game')===t ? `active-${cls}` : '';
              return `<button class="type-btn ${active}" id="type-${t}" onclick="selectType('${t}')">${t==='Video Game'?'🎮':t==='Board Game'?'♟️':'📖'} ${t}</button>`;
            }).join('')}
          </div>
        </div>
        <div class="modal-field">
          <label>Description</label>
          <textarea id="i-desc" rows="4" placeholder="What's the core concept?">${idea ? esc(idea.description||'') : ''}</textarea>
        </div>
        <div class="modal-field">
          <label>Themes / Tags <span style="color:var(--text3)">(comma separated)</span></label>
          <input type="text" id="i-tags" value="${idea ? (idea.tags||[]).join(', ') : ''}" placeholder="e.g. sci-fi, roguelike, co-op" />
        </div>
        <div class="modal-field">
          <label>Folder</label>
          <select id="i-folder">
            <option value="">— No folder —</option>
            ${state.folders.map(f => `<option value="${f.id}" ${idea?.folder_id===f.id?'selected':''}>${esc(f.name)}</option>`).join('')}
          </select>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-save" onclick="saveIdea()">Save Idea</button>
        </div>
      </div>
    </div>`;
  selectedType = idea?.type || 'Video Game';
}

let selectedType = 'Video Game';
function selectType(t) {
  selectedType = t;
  ['Video Game','Board Game','Story'].forEach(x => {
    const cls = x==='Video Game'?'vg':x==='Board Game'?'bg':'st';
    const el = document.getElementById(`type-${x}`);
    if (el) el.className = `type-btn${x===t?' active-'+cls:''}`;
  });
}

async function saveIdea() {
  const title = document.getElementById('i-title').value.trim();
  const desc = document.getElementById('i-desc').value.trim();
  const tags = document.getElementById('i-tags').value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
  const folder_id = document.getElementById('i-folder').value || null;
  if (!title) return;
  const payload = { title, type: selectedType, description: desc, tags, folder_id, user_id: state.user.id };
  if (state.editingIdea) {
    const { error } = await sb.from('ideas').update(payload).eq('id', state.editingIdea.id);
    if (error) { toast('Error saving', 'error'); return; }
  } else {
    const { error } = await sb.from('ideas').insert(payload);
    if (error) { toast('Error saving', 'error'); return; }
  }
  closeModal(); await loadIdeas(); renderSidebar(); renderIdeas(); toast('Idea saved ✦', 'success');
}

async function deleteIdea(id) {
  if (!confirm('Delete this idea?')) return;
  await sb.from('ideas').delete().eq('id', id);
  await loadIdeas(); renderSidebar(); renderIdeas(); toast('Idea deleted');
}

// ── AI Expand ─────────────────────────────────────────────────────────
async function expandIdea(id) {
  const idea = state.ideas.find(i => i.id === id);
  if (!idea) return;
  state.expandingId = id; renderIdeas();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CLAUDE_MODEL, max_tokens: 1000,
        system: `You are a creative collaborator helping develop ideas for games and stories.
Given an idea, provide:
• Core mechanics or plot hooks (3-4 specific, imaginative bullets)
• Unique selling point — what makes this unforgettable
• One key challenge to solve in development
• Elevator pitch (one punchy sentence)
Be specific, original, and concise. Under 250 words. Plain text only.`,
        messages: [{ role: 'user', content: `Title: ${idea.title}\nType: ${idea.type}\nDescription: ${idea.description}\nThemes: ${(idea.tags||[]).join(', ')||'none'}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || 'Could not expand.';
    await sb.from('ideas').update({ expanded_content: text }).eq('id', id);
    await loadIdeas();
  } catch(e) { toast('Expansion failed', 'error'); }
  state.expandingId = null; renderIdeas();
}

// ── Chat ──────────────────────────────────────────────────────────────
function openChat(id) {
  state.chatIdea = state.ideas.find(i => i.id === id);
  state.chatMessages = [];
  renderChat();
}

function renderChat() {
  const idea = state.chatIdea;
  if (!idea) { document.getElementById('chat-container').innerHTML = ''; return; }
  const msgs = state.chatMessages.map(m => `
    <div class="chat-msg ${m.role}">${esc(m.content)}</div>`).join('');
  document.getElementById('chat-container').innerHTML = `
    <div class="chat-panel" onclick="if(event.target===this)closeChat()">
      <div class="chat-box">
        <div class="chat-header">
          <div class="chat-title">💬 ${esc(idea.title)}</div>
          <button class="chat-close" onclick="closeChat()">✕</button>
        </div>
        <div class="chat-messages" id="chat-msgs">
          ${msgs || '<div class="chat-empty">Ask anything about this idea…</div>'}
          ${state.chatLoading ? '<div class="chat-msg thinking">Thinking…</div>' : ''}
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" placeholder="Ask something…" onkeydown="if(event.key==='Enter')sendChat()" />
          <button class="chat-send" onclick="sendChat()" ${state.chatLoading?'disabled':''}>→</button>
        </div>
      </div>
    </div>`;
  const msgs_el = document.getElementById('chat-msgs');
  if (msgs_el) msgs_el.scrollTop = msgs_el.scrollHeight;
  setTimeout(() => document.getElementById('chat-input')?.focus(), 50);
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input?.value?.trim();
  if (!text || state.chatLoading) return;
  const idea = state.chatIdea;
  state.chatMessages.push({ role: 'user', content: text });
  state.chatLoading = true; renderChat();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CLAUDE_MODEL, max_tokens: 1000,
        system: `You are a creative collaborator helping develop a ${idea.type} called "${idea.title}". Description: ${idea.description}. Themes: ${(idea.tags||[]).join(', ')||'none'}. Be specific, imaginative, and concise.`,
        messages: state.chatMessages
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || '…';
    state.chatMessages.push({ role: 'assistant', content: reply });
  } catch { state.chatMessages.push({ role: 'assistant', content: 'Something went wrong. Try again.' }); }
  state.chatLoading = false; renderChat();
}

function closeChat() { state.chatIdea = null; state.chatMessages = []; document.getElementById('chat-container').innerHTML = ''; }

// ── Utilities ─────────────────────────────────────────────────────────
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

const TAG_PALETTE = ['#60d090','#f0c060','#a060e0','#60a0e0','#e06090','#60d0d0','#e09060','#d0e060'];
function tagColor(tag) { let h=0; for(let c of tag) h=(h*31+c.charCodeAt(0))%TAG_PALETTE.length; return TAG_PALETTE[h]; }
function tagBg(tag) { return tagColor(tag)+'18'; }

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── PWA service worker ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
